######################################################
#                  Show Status                       #
######################################################

overlays:
  Airing:
    overlay:
      name: airing
      file: /config/overlays/images/airing.png
      group: STATUS
      weight: 950
    tmdb_on_the_air: 2000

  Returning:
    overlay:
      name: returning
      file: /config/overlays/images/returning.png
      group: STATUS
      weight: 800
    plex_all: true
    filters:
      tmdb_status:
        - returning
        - planned
        - production
        
  Ended:
    overlay:
      name: ended
      file: /config/overlays/images/ended.png
      group: STATUS
      weight: 700
    plex_all: true
    filters:
      tmdb_status: ended

  Canceled:
    overlay:
      name: cancelled
      file: /config/overlays/images/cancelled.png
      group: STATUS
      weight: 600
    plex_all: true
    filters:
      tmdb_status: canceled

######################################################
#                        New                         #
######################################################

  NewSeasonOnShow:
    overlay:
      name: NewSeason
      file: /config/overlays/images/new_season.png
      group: FRESH
      weight: 900
    plex_all: true
    filters:
      added.not: 30              # show wasn't added in the last 30 days
      seasons:
        percentage: 1            # at least one season matches
        added: 21                # that season was added in the last 14 days
        title.not: Specials      # skip Season 00 / Specials

  RecentlyAddedShow:
    overlay:
      name: Recently Added
      file: /config/overlays/images/recently_added.png
      group: RECENT
      weight: 949
    plex_all: true
    filters:
      added: 5